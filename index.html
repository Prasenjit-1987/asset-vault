    --danger: #F85149; --danger-dim: rgba(248,81,73,0.12);
    --warning: #D29922; --warning-dim: rgba(210,153,34,0.12);

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
  h1, h2, h3, h4, h5 { font-family: 'Space Grotesk', sans-serif; }

  }
  #loginOverlay.hidden { display: none; }
  .login-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;

  .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 40; }

  .sidebar .nav-item.active { background: var(--accent-dim); color: var(--accent); box-shadow: inset 3px 0 0 var(--accent); }
  .sidebar .nav-item i { width: 20px; text-align: center; font-size: 15px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: all 0.25s ease; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }

  .badge-nonassignable { background: var(--purple-dim); color: var(--purple); } .badge-active { background: var(--success-dim); color: var(--success); }
  .badge-inactive { background: var(--danger-dim); color: var(--danger); } .badge-pending { background: var(--warning-dim); color: var(--warning); }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: all 0.2s ease; white-space: nowrap; }
  .btn:active { transform: scale(0.97); } .btn-primary { background: var(--accent); color: #0D1117; }
  .btn-primary:hover { background: #E0B84E; } .btn-secondary { background: var(--surface-elevated); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); } .btn-danger { background: var(--danger-dim); color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; } .btn-success { background: var(--success-dim); color: var(--success); }
  .btn-success:hover { background: var(--success); color: white; } .btn-sm { padding: 5px 12px; font-size: 12px; }

  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .data-table thead th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); background: var(--surface-elevated); border-bottom: 1px solid var(--border); }
  .data-table tbody td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .data-table tbody tr { transition: background 0.15s; } .data-table tbody tr:hover { background: rgba(212,168,67,0.04); }

  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto; transform: translateY(20px) scale(0.97); transition: transform 0.25s ease; }
  .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

  .form-group { margin-bottom: 18px; } .form-label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .form-input, .form-select { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }

  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; min-width: 280px; display: flex; align-items: center; gap: 10px; animation: toastIn 0.35s ease; border: 1px solid; }
  .toast-success { background: var(--success-dim); border-color: rgba(63,185,80,0.3); color: var(--success); }
  .toast-error { background: var(--danger-dim); border-color: rgba(248,81,73,0.3); color: var(--danger); }
  .toast-warning { background: var(--warning-dim); border-color: rgba(210,153,34,0.3); color: var(--warning); }
  .toast-info { background: var(--teal-dim); border-color: rgba(34,184,207,0.3); color: var(--teal); }
  @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: relative; }
  .pulse-dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; animation: pulse 2s infinite; }
  .pulse-dot.green { background: var(--success); } .pulse-dot.green::after { border: 2px solid var(--success); }
  .pulse-dot.red { background: var(--danger); } .pulse-dot.red::after { border: 2px solid var(--danger); }
  .pulse-dot.yellow { background: var(--warning); } .pulse-dot.yellow::after { border: 2px solid var(--warning); }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(2); } }

  .activity-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }

// ===================== CLOUD SYNC LAYER =====================
let store = null;
let pushTimer = null;
let authToken = null; // Stores the password after login

function sanitizeData(data) {
  const parseNum = (val) => (val === "" || val === null || val === undefined) ? null : Number(val);
  data.assets.forEach(a => { a.id = parseNum(a.id); a.unitId = parseNum(a.unitId); a.assignedTo = parseNum(a.assignedTo); a.value = parseNum(a.value); });
  data.employees.forEach(e => { e.id = parseNum(e.id); e.unitId = parseNum(e.unitId); });
  data.revocationRequests.forEach(r => { r.id = parseNum(r.id); r.assetId = parseNum(r.assetId); r.employeeId = parseNum(r.employeeId); });
  data.activityLog.forEach(l => { l.id = parseNum(l.id); });
  return data;
}

async function fetchStore() {
  if (!authToken) return false;
  updateSaveIndicator('syncing');
  try {
    // Append token as a query parameter for GET requests
    const response = await fetch(API_URL + '?token=' + encodeURIComponent(authToken) + '&t=' + Date.now());
    const data = await response.json();
    if (data.error === "Unauthorized") { handleLogout(); return false; }
    if (data.businessUnits && data.assets && data.employees) {
      store = sanitizeData(data);
      store.revocationRequests = store.revocationRequests || [];
      store.activityLog = store.activityLog || [];
      updateSaveIndicator('synced');
      return true;
    }
  } catch (error) { console.error('Fetch error:', error); updateSaveIndicator('error'); }
  return false;
}

async function pushStore() {
  if (!authToken) return;
  updateSaveIndicator('syncing');
  try {
    // Include token inside the JSON payload for POST requests
    const payload = { ...store, token: authToken };
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    updateSaveIndicator('synced');
  } catch (error) { console.error('Push error:', error); updateSaveIndicator('error'); showToast('Sync failed','error'); }
}

function saveAndSync() { clearTimeout(pushTimer); pushTimer = setTimeout(() => { pushStore(); }, 600); }
function updateSaveIndicator(state) { const el=document.getElementById('sidebarSaveStatus'); if(!el)return; if(state==='synced'){el.className='save-indicator synced';el.innerHTML='<i class="fas fa-check-circle"></i> <span>Cloud Synced</span>';}else if(state==='syncing'){el.className='save-indicator syncing';el.innerHTML='<i class="fas fa-spinner fa-spin"></i> <span>Syncing...</span>';}else{el.className='save-indicator';el.innerHTML='<i class="fas fa-exclamation-circle" style="color:var(--danger)"></i> <span style="color:var(--danger)">Error</span>';} }

// ===================== LOGIN LOGIC =====================
function handleLogin() {
  const tokenInput = document.getElementById('loginTokenInput');
  const loginError = document.getElementById('loginError');
  const enteredToken = tokenInput.value.trim();
  
  if (!enteredToken) return;
  loginError.style.display = 'none';
  
  // Test the credentials by attempting a fetch
  authToken = enteredToken;
  fetchStore().then(success => {
    if (success) {
      document.getElementById('loginOverlay').classList.add('hidden');
      initApp();
    } else {
      authToken = null;
      loginError.style.display = 'block';
      tokenInput.value = '';
    }
  });
}

function handleLogout() {
  authToken = null;
  store = null;
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('contentArea').innerHTML = '';
  document.getElementById('loginTokenInput').value = '';
}

// Allow Enter key to submit login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginTokenInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') handleLogin();
  });
});

ick="openAssignModal(${a.id})"><i class="fas fa-user-plus"></i></button>`:''} ${a.status==='assigned'&&a.type==='assignable'?`<button class="btn btn-sm btn-danger" onclick="revokeSingleAsset(${a.id})"><i class="fas fa-rotate-left"></i></button>`:''} <button class="btn btn-sm btn-secondary" onclick="openAssetDetailModal(${a.id})"><i class="fas fa-eye"></i></button></div></td></tr>`;}).join('');}

// ===================== ADD ASSET =====================
function openAddAssetModal(){const cats={assignable:['Laptop','Phone','SIM Card','Headset','Tablet','Monitor'],'non-assignable':['Air Conditioner','Ceiling Fan','Wall Fan','Router','Switch','Server','Printer']};openModal(`<h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">Add New Asset</h3><form onsubmit="handleAddAsset(event)"><div class="form-group"><label class="form-label">Asset Name</label><input class="form-input" id="addAssetName" required></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div class="form-group"><label class="form-label">Serial Number</label><input class="form-input" id="addAssetSerial" required></div><div class="form-group"><label class="form-label">Asset Type</label><select class="form-select" id="addAssetType" required onchange="document.getElementById('addAssetCategory').innerHTML=cats[this.value].map(c=>'<option value='+c+'>'+c+'</option>').join('')"><option value="assignable">Assignable</option><option value="non-assignable">Non-Assignable</option></select></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div class="form-group"><label class="form-label">Category</label><select class="form-select" id="addAssetCategory" required>${cats.assignable.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Business Unit</label><select class="form-select" id="addAssetUnit" required>${store.businessUnits.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div class="form-group"><label class="form-label">Purchase Date</label><input class="form-input" id="addAssetDate" type="date" required></div><div class="form-group"><label class="form-label">Value (INR)</label><input class="form-input" id="addAssetValue" type="number" required min="0"></div></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Add Asset</button></div></form>`);}
function handleAddAsset(e){e.preventDefault();const a={id:generateId(),name:document.getElementById('addAssetName').value.trim(),serial:document.getElementById('addAssetSerial').value.trim(),type:document.getElementById('addAssetType').value,category:document.getElementById('addAssetCategory').value,unitId:parseInt(document.getElementById('addAssetUnit').value),status:'available',assignedTo:'',purchaseDate:document.getElementById('addAssetDate').value,value:parseInt(document.getElementById('addAssetValue').value)};store.assets.push(a);addActivity('Asset Added',`${a.name} added to ${getUnit(a.unitId).name}`,'asset');closeModal();showToast(`Asset added`);renderPage();}

// ===================== ASSET DETAIL =====================
function openAssetDetailModal(id){const a=getAsset(id);if(!a)return;const u=getUnit(a.unitId);const emp=a.assignedTo?getEmployee(a.assignedTo):null;openModal(`<div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;"><div style="width:50px;height:50px;background:${a.type==='assignable'?'var(--teal-dim)':'var(--purple-dim)'};border-radius:12px;display:flex;align-items:center;justify-content:center;"><i class="fas ${getCategoryIcon(a.category)}" style="color:${a.type==='assignable'?'var(--teal)':'var(--purple)'};font-size:20px;"></i></div><div><h3 style="font-size:18px;font-weight:700;">${a.name}</h3><div style="font-size:13px;color:var(--text-muted);">${a.serial} &middot; ${a.category}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;"><div style="background:var(--bg);border-radius:8px;padding:14px;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Status</div><div>${a.status==='assigned'?'<span class="badge badge-assigned">Assigned</span>':'<span class="badge badge-available">Available</span>'}</div></div><div style="background:var(--bg);border-radius:8px;padding:14px;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Value</div><div style="font-size:14px;font-weight:600;">${formatCurrency(a.value)}</div></div><div style="background:var(--bg);border-radius:8px;padding:14px;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Unit</div><div style="font-size:14px;font-weight:600;color:${u?.color};">${u?.name||'—'}</div></div><div style="background:var(--bg);border-radius:8px;padding:14px;"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Assigned To</div><div style="font-size:14px;font-weight:600;">${emp?emp.name:'<span style="color:var(--text-muted)">Unassigned</span>'}</div></div></div>${emp?`<div style="background:var(--bg);border-radius:8px;padding:16px;border:1px solid var(--border);"><div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;">ASSIGNEE</div><div style="display:flex;align-items:center;gap:12px;"><div style="width:38px;height:38px;background:var(--teal-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;"><i class="fas fa-user" style="color:var(--teal);"></i></div><div><div style="font-weight:600;">${emp.name}</div><div style="font-size:12px;color:var(--text-muted);">${emp.jobProfile} &middot; ${getUnit(emp.unitId)?.name}</div></div></div></div>`:''}<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">${a.type==='assignable'&&a.status==='available'?`<button class="btn btn-success" onclick="closeModal();openAssignModal(${a.id})"><i class="fas fa-user-plus"></i> Assign</button>`:''} ${a.status==='assigned'&&a.type==='assignable'?`<button class="btn btn-danger" onclick="closeModal();revokeSingleAsset(${a.id})"><i class="fas fa-rotate-left"></i> Revoke</button>`:''} <button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);}

// ===================== EMPLOYEES =====================
function renderEmployees(){setPageActions(`<button class="btn btn-primary" onclick="openAddEmployeeModal()"><i class="fas fa-user-plus"></i> Add Employee</button>`);document.getElementById('contentArea').innerHTML=`<div id="employeeGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;"></div>`;const g=document.getElementById('employeeGrid');g.innerHTML=store.employees.map(emp=>{const un=getUnit(emp.unitId);const as=getEmployeeAssets(emp.id).filter(a=>a.status==='assigned');return `<div class="card" style="padding:20px;${emp.status==='inactive'?'opacity:0.6;':''}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;"><div style="display:flex;gap:12px;align-items:center;"><div style="width:44px;height:44px;background:${un?.color||'var(--accent)'}20;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:${un?.color||'var(--accent)'};">${emp.name.split(' ').map(n=>n[0]).join('')}</div><div><div style="font-weight:700;font-size:15px;">${emp.name} ${emp.status==='active'?'<span class="pulse-dot green"></span>':'<span class="pulse-dot red"></span>'}</div><div style="font-size:12px;color:var(--text-muted);">${emp.jobProfile}</div></div></div><span class="badge ${emp.status==='active'?'badge-active':'badge-inactive'}">${emp.status}</span></div><div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;"><i class="fas fa-building" style="color:${un?.color};margin-right:4px;"></i>${un?.name||'—'}</div><div style="border-top:1px solid var(--border);padding-top:12px;"><div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;">Assets (${as.length})</div>${as.length?as.map(a=>`<div style="font-size:12px;margin-bottom:4px;"><i class="fas ${getCategoryIcon(a.category)}" style="color:var(--teal);margin-right:6px;"></i>${a.name}</div>`).join(''):'<div style="font-size:12px;color:var(--text-muted);font-style:italic;">No assets</div>'}</div><div style="display:flex;gap:8px;margin-top:14px;">${emp.status==='active'?`<button class="btn btn-sm btn-success" onclick="openAssignModal(null,${emp.id})"><i class="fas fa-plus"></i> Assign</button><button class="btn btn-sm btn-danger" onclick="markEmployeeLeft(${emp.id})"><i class="fas fa-door-open"></i> Left</button>`:'<span style="font-size:12px;color:var(--danger);">Left organization</span>'}</div></div>`;}).join('');}
function openAddEmployeeModal(){openModal(`<h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">Add Employee</h3><form onsubmit="handleAddEmployee(event)"><div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="addEmpName" required></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="addEmpEmail" type="email" required></div><div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="addEmpPhone" required></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div class="form-group"><label class="form-label">Unit</label><select class="form-select" id="addEmpUnit" required>${store.businessUnits.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Job Profile</label><input class="form-input" id="addEmpProfile" required></div></div><div class="form-group"><label class="form-label">Join Date</label><input class="form-input" id="addEmpDate" type="date" required></div><div style="display:flex;gap:10px;justify-content:flex-end;"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Add</button></div></form>`);}
function handleAddEmployee(e){e.preventDefault();const emp={id:generateId(),name:document.getElementById('addEmpName').value.trim(),email:document.getElementById('addEmpEmail').value.trim(),phone:document.getElementById('addEmpPhone').value.trim(),unitId:parseInt(document.getElementById('addEmpUnit').value),jobProfile:document.getElementById('addEmpProfile').value.trim(),status:'active',joinDate:document.getElementById('addEmpDate').value};store.employees.push(emp);addActivity('New Employee',`${emp.name} joined ${getUnit(emp.unitId).name}`,'employee');closeModal();showToast(`Employee added`);renderPage();}

// ===================== ASSIGNMENTS =====================
function openAssignModal(assetId,empId){const av=store.assets.filter(a=>a.type==='assignable'&&a.status==='available');const ac=store.employees.filter(e=>e.status==='active');if(!av.length||!ac.length){showToast('No available assets or employees','warning');return;}openModal(`<h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">Assign Asset</h3><form onsubmit="handleAssignAsset(event)"><div class="form-group"><label class="form-label">Asset</label><select class="form-select" id="assignAssetId" required ${assetId?'disabled':''}>${av.map(a=>`<option value="${a.id}" ${a.id===assetId?'selected':''}>${a.name} (${a.serial})</option>`).join('')}</select>${assetId?`<input type="hidden" id="assignAssetIdHidden" value="${assetId}">`:''}</div><div class="form-group"><label class="form-label">Employee</label><select class="form-select" id="assignEmpId" required ${empId?'disabled':''}>${ac.map(e=>`<option value="${e.id}" ${e.id===empId?'selected':''}>${e.name} — ${e.jobProfile}</option>`).join('')}</select>${empId?`<input type="hidden" id="assignEmpIdHidden" value="${empId}">`:''}</div><div style="display:flex;gap:10px;justify-content:flex-end;"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Confirm</button></div></form>`);}
function handleAssignAsset(e){e.preventDefault();let aid=parseInt(document.getElementById('assignAssetIdHidden')?.value||document.getElementById('assignAssetId').value);let eid=parseInt(document.getElementById('assignEmpIdHidden')?.value||document.getElementById('assignEmpId').value);const a=getAsset(aid);const emp=getEmployee(eid);if(!a||!emp)return;a.status='assigned';a.assignedTo=eid;addActivity('Asset Assigned',`${a.name} assigned to ${emp.name}`,'assignment');closeModal();showToast(`${a.name} assigned`);renderPage();}
function renderAssignments(){setPageActions(`<button class="btn btn-primary" onclick="openAssignModal()"><i class="fas fa-plus"></i> New Assignment</button>`);const as=store.assets.filter(a=>a.status==='assigned'&&a.type==='assignable');document.getElementById('contentArea').innerHTML=`<div class="card" style="padding:0;overflow:hidden;"><div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Asset</th><th>Serial</th><th>Employee</th><th>Profile</th><th>Unit</th><th>Action</th></tr></thead><tbody>${!as.length?`<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">No active assignments</td></tr>`:as.map(a=>{const emp=getEmployee(a.assignedTo);const u=getUnit(a.unitId);return `<tr><td style="font-weight:600;">${a.name}</td><td><code style="font-size:12px;background:var(--bg);padding:2px 8px;border-radius:4px;">${a.serial}</code></td><td>${emp?.name||'—'}</td><td style="color:var(--text-muted);">${emp?.jobProfile||'—'}</td><td><span style="color:${u?.color};font-weight:500;">${u?.code||'—'}</span></td><td><button class="btn btn-sm btn-danger" onclick="revokeSingleAsset(${a.id})"><i class="fas fa-rotate-left"></i> Revoke</button></td></tr>`;}).join('')}</tbody></table></div></div>`;}

// ===================== REVOCATIONS =====================
function revokeSingleAsset(id){const a=getAsset(id);if(!a||a.status!=='assigned')return;const emp=getEmployee(a.assignedTo);openModal(`<h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">Revoke Asset</h3><p style="font-size:14px;color:var(--text-muted);margin-bottom:20px;">Revoke <strong>${a.name}</strong> from <strong>${emp?.name||'Unknown'}</strong>?</p><div style="display:flex;gap:10px;justify-content:flex-end;"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmRevokeAsset(${id})">Confirm</button></div>`);}
function confirmRevokeAsset(id){const a=getAsset(id);if(!a)return;const emp=a.assignedTo?getEmployee(a.assignedTo):null;a.status='available';a.assignedTo='';addActivity('Asset Revoked',`${a.name} revoked from ${emp?.name||'Unknown'}`,'revocation');closeModal();showToast(`${a.name} revoked`,'info');renderPage();}
function markEmployeeLeft(id){const emp=getEmployee(id);if(!emp)return;const as=getEmployeeAssets(id).filter(a=>a.status==='assigned');openModal(`<h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">Mark as Left</h3><p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">Mark <strong>${emp.name}</strong> as left? ${as.length?`Creates ${as.length} revocation request(s).`:'No assets to revoke.'}</p><div style="display:flex;gap:10px;justify-content:flex-end;"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmEmployeeLeft(${id})">Confirm</button></div>`);}
function confirmEmployeeLeft(id){const emp=getEmployee(id);if(!emp)return;emp.status='inactive';const as=getEmployeeAssets(id).filter(a=>a.status==='assigned');as.forEach(a=>{store.revocationRequests.push({id:generateId(),assetId:a.id,employeeId:id,requestDate:new Date().toISOString(),status:'pending',reason:'Employee left',processedDate:'',outcome:''});});addActivity('Employee Left',`${emp.name} marked as left.`,'revocation');closeModal();showToast(`${emp.name} marked as left`,'warning');renderPage();}
function renderRevocations(){setPageActions('');const p=store.revocationRequests.filter(r=>r.status==='pending');const c=store.revocationRequests.filter(r=>r.status==='completed');document.getElementById('contentArea').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;"><div class="card" style="border-left:3px solid var(--danger);"><div style="font-size:28px;font-weight:700;color:var(--danger);font-family:'Space Grotesk';">${p.length}</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Pending</div></div><div class="card" style="border-left:3px solid var(--success);"><div style="font-size:28px;font-weight:700;color:var(--success);font-family:'Space Grotesk';">${c.length}</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;">Completed</div></div></div>${!p.length?'<div class="card" style="text-align:center;padding:40px;color:var(--text-muted);">All revocations processed</div>':`<div style="display:flex;flex-direction:column;gap:12px;">${p.map(r=>{const a=getAsset(r.assetId);const emp=getEmployee(r.employeeId);return `<div class="revoke-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;"><div><div style="font-weight:700;">${a?.name||'Unknown'}</div><div style="font-size:12px;color:var(--text-muted);">From: <strong style="color:var(--danger);">${emp?.name||'Unknown'}</strong></div></div><div style="display:flex;gap:8px;"><button class="btn btn-success btn-sm" onclick="processRevocation(${r.id},'return')">Returned</button><button class="btn btn-danger btn-sm" onclick="processRevocation(${r.id},'lost')">Lost</button></div></div></div>`;}).join('')}</div>`}`}
function processRevocation(id,outcome){const r=store.revocationRequests.find(x=>x.id===id);if(!r)return;const a=getAsset(r.assetId);r.status='completed';r.processedDate=new Date().toISOString();r.outcome=outcome==='return'?'returned':'lost_damaged';if(a){a.status=outcome==='return'?'available':'maintenance';a.assignedTo='';}addActivity('Revocation Processed',`${a?.name||'Asset'} ${outcome==='return'?'returned':'marked lost'}`,'revocation');showToast(`Processed`,'success');renderPage();}

// ===================== INITIALIZATION =====================
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

async function initApp() {
  const success = await fetchStore();
  if (success && store.businessUnits.length === 0) {
    store = JSON.parse(JSON.stringify(SEED_DATA));
    await pushStore();
    await fetchStore();
  } else if (!success) {
    showToast('Connection failed', 'error'); return;
  }
  navigateTo('dashboard');
  setInterval(async () => { const prev=JSON.stringify(store); const s=await fetchStore(); if(s&&JSON.stringify(store)!==prev) renderPage(); }, POLL_INTERVAL);
}

// App does NOT auto-initialize anymore. It waits for login.
</script>
</body>
</html>
